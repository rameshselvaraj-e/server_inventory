{% extends 'base.html' %}
{% block title %}{{ action }} Vendor{% endblock %}
{% block page_title %}{{ action }} Vendor{% endblock %}

{% block content %}
<div class="form-card">
  <form method="post">
    <div class="form-grid">

      <div class="form-group">
        <label>Vendor Name *</label>
        <input type="text" name="vendor_name" value="{{ row.vendor_name if row else '' }}" required class="form-input" placeholder="Dell Technologies"/>
      </div>

      <div class="form-group">
        <label>Category</label>
        <select name="category" class="form-select">
          {% for c in ['hardware','software','cloud','support','services','other'] %}
            <option value="{{ c }}" {% if row and row.category==c %}selected{% endif %}>{{ c.title() }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Contact Name</label>
        <input type="text" name="contact_name" value="{{ row.contact_name if row else '' }}" class="form-input" placeholder="Support Portal"/>
      </div>

      <div class="form-group">
        <label>Contact Email</label>
        <input type="email" name="contact_email" value="{{ row.contact_email if row else '' }}" class="form-input" placeholder="support@vendor.com"/>
      </div>

      <div class="form-group">
        <label>Contact Phone</label>
        <input type="text" name="contact_phone" value="{{ row.contact_phone if row else '' }}" class="form-input" placeholder="1-800-xxx-xxxx"/>
      </div>

      <div class="form-group">
        <label>Account Manager</label>
        <input type="text" name="account_manager" value="{{ row.account_manager if row else '' }}" class="form-input" placeholder="Alice Johnson"/>
      </div>

      <div class="form-group">
        <label>AM Email</label>
        <input type="email" name="am_email" value="{{ row.am_email if row else '' }}" class="form-input" placeholder="alice@vendor.com"/>
      </div>

      <div class="form-group">
        <label>AM Phone</label>
        <input type="text" name="am_phone" value="{{ row.am_phone if row else '' }}" class="form-input"/>
      </div>

      <div class="form-group">
        <label>Website</label>
        <input type="url" name="website" value="{{ row.website if row else '' }}" class="form-input" placeholder="https://vendor.com"/>
      </div>

      <div class="form-group">
        <label>Account Number</label>
        <input type="text" name="account_number" value="{{ row.account_number if row else '' }}" class="form-input"/>
      </div>

      <div class="form-group">
        <label>Contract Start</label>
        <input type="date" name="contract_start" value="{{ row.contract_start if row else '' }}" class="form-input"/>
      </div>

      <div class="form-group">
        <label>Contract End</label>
        <input type="date" name="contract_end" value="{{ row.contract_end if row else '' }}" class="form-input"/>
      </div>

      <div class="form-group">
        <label>Payment Terms</label>
        <input type="text" name="payment_terms" value="{{ row.payment_terms if row else '' }}" class="form-input" placeholder="Net 30, Annual, etc."/>
      </div>

      <div class="form-group">
        <label>Status</label>
        <select name="status" class="form-select">
          {% for s in ['active','inactive','blacklisted'] %}
            <option value="{{ s }}" {% if row and row.status==s %}selected{% elif not row and s=='active' %}selected{% endif %}>{{ s.title() }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group form-full">
        <label>Address</label>
        <textarea name="address" class="form-textarea" rows="2">{{ row.address if row else '' }}</textarea>
      </div>

      <div class="form-group form-full">
        <label>Notes</label>
        <textarea name="notes" class="form-textarea" rows="3">{{ row.notes if row else '' }}</textarea>
      </div>

    </div>
    <div class="form-actions">
      <button type="submit" class="btn-submit">{{ action }} Vendor</button>
      <a href="{{ url_for('vendor_list') }}" class="btn-cancel">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
