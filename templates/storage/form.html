{% extends 'base.html' %}
{% block title %}{{ action }} Storage{% endblock %}
{% block page_title %}{{ action }} Storage Device{% endblock %}

{% block content %}
<div class="form-card">
  <form method="post">

    <div class="form-section-title">Device Identity</div>
    <div class="form-grid">

      <div class="form-group">
        <label>Device Name *</label>
        <input type="text" name="device_name" value="{{ row.device_name if row else '' }}" required class="form-input" placeholder="nas-prod-01"/>
      </div>

      <div class="form-group">
        <label>Asset Tag</label>
        <input type="text" name="asset_tag" value="{{ row.asset_tag if row else '' }}" class="form-input" placeholder="STG-001"/>
      </div>

      <div class="form-group">
        <label>Storage Type</label>
        <select name="storage_type" class="form-select">
          {% for t in ['SSD','HDD','NVMe','SAN','NAS','Tape','Object','Cloud'] %}
            <option value="{{ t }}" {% if row and row.storage_type==t %}selected{% endif %}>{{ t }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Manufacturer</label>
        <input type="text" name="manufacturer" value="{{ row.manufacturer if row else '' }}" class="form-input" placeholder="NetApp, Pure Storage, Seagate..."/>
      </div>

      <div class="form-group">
        <label>Model</label>
        <input type="text" name="model" value="{{ row.model if row else '' }}" class="form-input" placeholder="AFF A400, FlashArray //X70, Exos X20"/>
      </div>

      <div class="form-group">
        <label>Serial Number</label>
        <input type="text" name="serial_number" value="{{ row.serial_number if row else '' }}" class="form-input"/>
      </div>

    </div>

    <div class="form-section-title" style="margin-top:24px;">Specifications</div>
    <div class="form-grid">

      <div class="form-group">
        <label>Capacity (TB)</label>
        <input type="number" name="capacity_tb" step="0.01" value="{{ row.capacity_tb if row else '' }}" class="form-input" placeholder="200.00"/>
      </div>

      <div class="form-group">
        <label>Used (TB)</label>
        <input type="number" name="used_tb" step="0.01" value="{{ row.used_tb if row else '' }}" class="form-input" placeholder="120.50"/>
      </div>

      <div class="form-group">
        <label>Interface</label>
        <input type="text" name="interface" value="{{ row.interface if row else '' }}" class="form-input" placeholder="NVMe, SAS 12Gb, FC, iSCSI, NFS/SMB"/>
      </div>

      <div class="form-group">
        <label>Form Factor</label>
        <input type="text" name="form_factor" value="{{ row.form_factor if row else '' }}" class="form-input" placeholder='2.5", 3.5", M.2, U.2, Rack 2U'/>
      </div>

      <div class="form-group">
        <label>RPM (HDD only)</label>
        <input type="number" name="rpm" value="{{ row.rpm if row else '' }}" class="form-input" placeholder="7200, 10000, 15000"/>
      </div>

      <div class="form-group">
        <label>IOPS</label>
        <input type="number" name="iops" value="{{ row.iops if row else '' }}" class="form-input" placeholder="250000"/>
      </div>

      <div class="form-group">
        <label>Throughput (GB/s)</label>
        <input type="number" name="throughput_gbps" step="0.01" value="{{ row.throughput_gbps if row else '' }}" class="form-input" placeholder="12.00"/>
      </div>

      <div class="form-group">
        <label>Filesystem</label>
        <input type="text" name="filesystem" value="{{ row.filesystem if row else '' }}" class="form-input" placeholder="ext4, XFS, NTFS, ZFS, WAFL"/>
      </div>

      <div class="form-group">
        <label>RAID Group</label>
        <input type="text" name="raid_group" value="{{ row.raid_group if row else '' }}" class="form-input" placeholder="RAID-5, RAID-10, JBOD, RAID-DP"/>
      </div>

    </div>

    <div class="form-section-title" style="margin-top:24px;">Location & Assignment</div>
    <div class="form-grid">

      <div class="form-group">
        <label>Host Server</label>
        <input type="text" name="host_server" value="{{ row.host_server if row else '' }}" class="form-input" placeholder="srv-prod-001"/>
      </div>

      <div class="form-group">
        <label>Array / NAS Name</label>
        <input type="text" name="array_name" value="{{ row.array_name if row else '' }}" class="form-input" placeholder="nas-prod-01"/>
      </div>

      <div class="form-group">
        <label>Mount Point / Share</label>
        <input type="text" name="mount_point" value="{{ row.mount_point if row else '' }}" class="form-input" placeholder="/mnt/data or \\nas\share"/>
      </div>

      <div class="form-group">
        <label>IP Address</label>
        <input type="text" name="ip_address" value="{{ row.ip_address if row else '' }}" class="form-input" placeholder="10.10.5.10"/>
      </div>

      <div class="form-group">
        <label>Assigned To</label>
        <input type="text" name="assigned_to" value="{{ row.assigned_to if row else '' }}" class="form-input" placeholder="ops-team, backup-team"/>
      </div>

      <div class="form-group">
        <label>Environment</label>
        <select name="environment" class="form-select">
          {% for e in ['production','staging','development','testing'] %}
            <option value="{{ e }}" {% if row and row.environment==e %}selected{% elif not row and e=='production' %}selected{% endif %}>{{ e.title() }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Status</label>
        <select name="status" class="form-select">
          {% for s in ['active','inactive','faulty','degraded','maintenance','decommissioned'] %}
            <option value="{{ s }}" {% if row and row.status==s %}selected{% elif not row and s=='active' %}selected{% endif %}>{{ s.title() }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Purchase Date</label>
        <input type="date" name="purchase_date" value="{{ row.purchase_date if row else '' }}" class="form-input"/>
      </div>

      <div class="form-group form-full">
        <label>Notes</label>
        <textarea name="notes" class="form-textarea" rows="3">{{ row.notes if row else '' }}</textarea>
      </div>

    </div>

    <div class="form-actions">
      <button type="submit" class="btn-submit">{{ action }} Storage</button>
      <a href="{{ url_for('storage_list') }}" class="btn-cancel">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
