{% extends 'base.html' %}
{% block title %}{{ action }} Virtual Machine{% endblock %}
{% block page_title %}{{ action }} Virtual Machine{% endblock %}

{% block content %}
<div class="form-card">
  <form method="post">
    <div class="form-grid">

      <div class="form-group">
        <label>VM Name *</label>
        <input type="text" name="vm_name" value="{{ row.vm_name if row else '' }}" required class="form-input" placeholder="vm-web-prod-01"/>
      </div>

      <div class="form-group">
        <label>Host Server</label>
        <input type="text" name="host_server" value="{{ row.host_server if row else '' }}" class="form-input" placeholder="srv-prod-001"/>
      </div>

      <div class="form-group">
        <label>Hypervisor</label>
        <input type="text" name="hypervisor" value="{{ row.hypervisor if row else '' }}" class="form-input" placeholder="VMware ESXi 7, KVM, Hyper-V"/>
      </div>

      <div class="form-group">
        <label>vCPU</label>
        <input type="number" name="vcpu" value="{{ row.vcpu if row else '' }}" class="form-input" placeholder="8"/>
      </div>

      <div class="form-group">
        <label>RAM (GB)</label>
        <input type="number" name="ram_gb" value="{{ row.ram_gb if row else '' }}" class="form-input" placeholder="32"/>
      </div>

      <div class="form-group">
        <label>Storage (GB)</label>
        <input type="number" name="storage_gb" value="{{ row.storage_gb if row else '' }}" class="form-input" placeholder="200"/>
      </div>

      <div class="form-group">
        <label>IP Address</label>
        <input type="text" name="ip_address" value="{{ row.ip_address if row else '' }}" class="form-input" placeholder="10.10.1.100"/>
      </div>

      <div class="form-group">
        <label>Operating System</label>
        <input type="text" name="os" value="{{ row.os if row else '' }}" class="form-input" placeholder="Ubuntu 22.04"/>
      </div>

      <div class="form-group">
        <label>Environment</label>
        <select name="environment" class="form-select">
          {% for e in ['production','staging','development','testing'] %}
            <option value="{{ e }}" {% if row and row.environment==e %}selected{% elif not row and e=='production' %}selected{% endif %}>{{ e.title() }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Status</label>
        <select name="status" class="form-select">
          {% for s in ['running','stopped','suspended','deleted'] %}
            <option value="{{ s }}" {% if row and row.status==s %}selected{% elif not row and s=='running' %}selected{% endif %}>{{ s.title() }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Owner</label>
        <input type="text" name="owner" value="{{ row.owner if row else '' }}" class="form-input" placeholder="ops-team"/>
      </div>

      <div class="form-group">
        <label>Project</label>
        <input type="text" name="project" value="{{ row.project if row else '' }}" class="form-input" placeholder="web-frontend"/>
      </div>

      <div class="form-group form-full">
        <label>Notes</label>
        <textarea name="notes" class="form-textarea" rows="3">{{ row.notes if row else '' }}</textarea>
      </div>

    </div>
    <div class="form-actions">
      <button type="submit" class="btn-submit">{{ action }} VM</button>
      <a href="{{ url_for('virtual_list') }}" class="btn-cancel">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
